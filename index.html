<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Houses</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #0a0a0b;
    color: white;
    font-family: Arial;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="text-center py-10">
    <h1 class="text-3xl font-bold">
        Join <span style="color:#ff4d00">Houses</span>
    </h1>
    <p class="text-gray-400 mt-2">
        Imóveis para alugar com segurança
    </p>
</header>

<!-- BOTÃO -->
<div class="text-center mb-10">
    <a href="https://wa.me/5584987755048" target="_blank"
       class="bg-[#ff4d00] px-6 py-3 rounded-lg font-bold">
       Falar no WhatsApp
    </a>
</div>

<!-- IMÓVEIS -->
<section class="max-w-7xl mx-auto px-4">
    <h2 class="text-2xl font-bold mb-6 text-center" style="color:#ff4d00;">
        Imóveis Disponíveis
    </h2>

    <div id="lista-imoveis" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</section>

<!-- PROPRIETÁRIO -->
<section class="text-center py-20">
    <h2 class="text-2xl font-bold mb-4" style="color:#ff4d00;">
        Anuncie seu imóvel
    </h2>

    <p class="text-gray-400 mb-6">
        Administração completa por apenas 10% do aluguel. Sem taxa fixa.
    </p>

    <a href="https://wa.me/5584987755048" target="_blank"
       class="bg-[#ff4d00] px-6 py-3 rounded-lg font-bold">
       Cadastrar imóvel
    </a>
</section>

<!-- FOOTER -->
<footer class="text-center py-6 border-t border-gray-800">
    <p class="text-gray-500">
        © 2026 Join Houses
    </p>
</footer>

<!-- SCRIPT -->
<script>
const url = "https://docs.google.com/spreadsheets/d/1dH_Xp8FqChqxdRl0Jdrnbtc4db3UoyK5vp6hWHVwOCo/gviz/tq?tqx=out:csv";

fetch(url)
.then(res => res.text())
.then(data => {

    const linhas = data.split("\n").slice(1);
    const container = document.getElementById("lista-imoveis");

    container.innerHTML = "";

    linhas.forEach(linha => {

        const col = linha.split(",");

        const titulo = col[0];
        const preco = col[1];
        const cidade = col[2];
        const bairro = col[3];
        const metragem = col[4];
        const status = col[7];
        const imagem = col[8];

        if (status && status.trim().toLowerCase() === "disponivel") {

            const mensagem = `Tenho interesse no imóvel: ${titulo} em ${bairro}`;

            const card = `
                <div class="bg-[#111] p-4 rounded-lg border border-gray-800">
                    <img src="${imagem}" class="w-full h-48 object-cover rounded mb-4">
                    <h3 class="font-bold text-lg">${titulo}</h3>
                    <p class="text-gray-400">${bairro} - ${cidade}</p>
                    <p class="text-gray-400">${metragem} m²</p>
                    <p class="text-[#ff4d00] font-bold text-xl mt-2">R$ ${preco}</p>

                    <a target="_blank"
                       href="https://wa.me/5584987755048?text=${encodeURIComponent(mensagem)}"
                       class="block text-center bg-[#ff4d00] mt-4 p-3 rounded font-bold">
                       Tenho interesse
                    </a>
                </div>
            `;

            container.innerHTML += card;
        }

    });

});
</script>

</body>
</html>
